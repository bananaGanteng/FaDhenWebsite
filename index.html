<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Send to Discord Webhook</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      background: #1e1e2f;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 15px;
    }

    .container {
      background: #2c2c3e;
      padding: 20px;
      border-radius: 12px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
    }

    h3 {
      margin-bottom: 15px;
    }

    textarea {
      width: 100%;
      height: 120px;
      border-radius: 8px;
      border: none;
      padding: 12px;
      resize: none;
      font-size: 16px;
      margin-bottom: 12px;
    }

    button {
      width: 100%;
      padding: 14px;
      background: #5865F2;
      border: none;
      color: white;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    button:active {
      transform: scale(0.98);
      background: #4752c4;
    }

    #status {
      margin-top: 10px;
      font-size: 14px;
      opacity: 0.8;
    }

    @media (max-width: 400px) {
      textarea {
        height: 100px;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <h3>Kirim Pesan</h3>
  <textarea id="message" placeholder="Tulis pesan..."></textarea>
  <button onclick="sendMessage()">Send</button>
  <div id="status"></div>
</div>

<script>
  async function sendMessage() {
    const message = document.getElementById("message").value;
    const status = document.getElementById("status");

    if (!message) {
      status.innerText = "Pesan tidak boleh kosong!";
      return;
    }

    status.innerText = "Mengirim...";

    try {
      const response = await fetch("https://discord.com/api/webhooks/1476282471913095332/H00ff-V-4UqnkZuLy-PQIsCNbsa1jQOwajqHndtuhlTX8z3WfhEOE91MaOTqip-aWEXy", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          content: message
        })
      });

      if (response.ok) {
        status.innerText = "berhasil dikirim!";
        document.getElementById("message").value = "";
      } else {
        status.innerText = "Gagal mengirim!";
      }

    } catch (error) {
      status.innerText = "Error: " + error;
    }
  }
</script>

</body>
</html>
